<!DOCTYPE html>
<html>

<head>

    <title>AI Login Detector</title>

</head>

<body>

    <h1>AI Suspicious Login Detector</h1>

    <form action="/predict" method="POST">

        <input type="number"
               name="failed_logins"
               placeholder="Failed Logins"
               required>

        <br><br>

        <input type="number"
               step="0.01"
               name="ip_risk_score"
               placeholder="IP Risk Score"
               required>

        <br><br>

        <input type="number"
               name="unusual_time"
               placeholder="Unusual Time? 0 or 1"
               required>

        <br><br>

        <input type="number"
               name="new_device"
               placeholder="New Device? 0 or 1"
               required>

        <br><br>

        <button type="submit">

            Check Login

        </button>

    </form>

    {% if prediction %}

        <h2>{{ prediction }}</h2>

        <h3>Probability: {{ probability }}</h3>

    {% endif %}

</body>

</html>
